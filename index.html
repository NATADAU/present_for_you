<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ты космос</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#0a0e27;font-family:'Segoe UI',system-ui,sans-serif}
canvas{position:fixed;top:0;left:0;width:100%;height:100%;display:block}
.star-counter{
position:fixed;top:20px;left:24px;color:rgba(255,255,255,0.5);
font-size:.85rem;font-weight:300;letter-spacing:2px;z-index:10;
user-select:none;pointer-events:none;font-variant-numeric:tabular-nums;
}
.star-counter span{color:rgba(187,134,252,0.8);font-weight:600}
.instruction{
position:fixed;bottom:50%;left:50%;transform:translate(-50%,50%);
color:rgba(255,255,255,0.3);font-size:1.1rem;letter-spacing:4px;
z-index:10;pointer-events:none;user-select:none;
animation:fadeInOut 10s ease forwards;text-align:center;
}
@keyframes fadeInOut{
0%{opacity:0;transform:translate(-50%,50%) scale(.95)}
15%{opacity:.6;transform:translate(-50%,50%) scale(1)}
25%{opacity:.6;transform:translate(-50%,50%) scale(1)}
100%{opacity:0;transform:translate(-50%,50%) scale(.95)}
}
/* Аффирмации — без рукописного шрифта, читаемый размер на любом экране */
.affirmation{
position:fixed;z-index:20;pointer-events:none;
font-family:'Segoe UI',system-ui,sans-serif;
font-size:1.5rem;font-weight:600;color:#fff;
text-shadow:0 0 10px rgba(187,134,252,0.8),0 0 30px rgba(187,134,252,0.4),0 0 60px rgba(187,134,252,0.2);
animation:affirmAppear .8s cubic-bezier(.34,1.56,.64,1) forwards;
max-width:340px;text-align:center;line-height:1.45;
}
@media(max-width:600px){
.affirmation{font-size:1.25rem;max-width:260px;font-weight:600}
.instruction{font-size:.85rem;letter-spacing:2px}
.magic-btn{padding:12px 24px;font-size:.9rem;bottom:20px}
.star-counter{font-size:.75rem;top:12px;left:16px}
.audio-btn{width:34px;height:34px;font-size:.85rem;top:12px;right:16px}
}
@keyframes affirmAppear{
0%{opacity:0;transform:translateY(20px) scale(.5)}
100%{opacity:1;transform:translateY(0) scale(1)}
}
.affirm-fade{animation:affirmFade .8s ease forwards}
@keyframes affirmFade{
0%{opacity:1;transform:translateY(0) scale(1)}
100%{opacity:0;transform:translateY(-30px) scale(1.1)}
}
.magic-btn{
position:fixed;bottom:32px;left:50%;transform:translateX(-50%);
z-index:15;padding:14px 36px;border:none;border-radius:50px;
background:linear-gradient(135deg,rgba(187,134,252,0.3),rgba(207,102,121,0.2));
backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);
border:1px solid rgba(187,134,252,0.3);box-shadow:0 0 30px rgba(187,134,252,0.15);
color:#fff;font-size:1.05rem;font-weight:600;cursor:pointer;
font-family:inherit;letter-spacing:1px;
transition:all .4s cubic-bezier(.34,1.56,.64,1);user-select:none;
}
.magic-btn:hover{
transform:translateX(-50%) translateY(-4px) scale(1.05);
box-shadow:0 0 50px rgba(187,134,252,0.35);
background:linear-gradient(135deg,rgba(187,134,252,0.5),rgba(207,102,121,0.3));
border-color:rgba(187,134,252,0.6);
}
.magic-btn:active{transform:translateX(-50%) scale(.95)}
.audio-btn{
position:fixed;top:20px;right:24px;z-index:15;
width:40px;height:40px;border-radius:50%;border:1px solid rgba(255,255,255,0.12);
background:rgba(255,255,255,0.05);backdrop-filter:blur(6px);
color:rgba(255,255,255,0.5);font-size:1rem;cursor:pointer;
display:flex;align-items:center;justify-content:center;
transition:all .3s;font-family:inherit;
}
.audio-btn:hover{background:rgba(255,255,255,0.1);color:#fff;border-color:rgba(255,255,255,0.3)}
.audio-btn.muted{color:rgba(255,255,255,0.2)}
</style>
</head>
<body>
<canvas id="cosmos"></canvas>
<div class="star-counter"><span id="starCount">0</span> звёзд в небе</div>
<button class="audio-btn" id="audioBtn" title="Фоновая музыка">♪</button>
<audio id="bgMusic" loop preload="metadata"><source src="music.mp3" type="audio/mpeg"></audio>
<div class="instruction">✧ кликай по звёздам ✧</div>
<button class="magic-btn" id="magicBtn">Хочу волшебства</button>

<script>
const AFFIRMATIONS=[
"Ты справляешься лучше, чем думаешь",
"Завтра будет ещё один шанс",
"Ты заслуживаешь отдыха",
"Всё идёт так, как должно",
"Ты сильнее, чем кажется",
"Мечты сбываются",
"Ты создаёшь свою реальность",
"Всё получится",
"Ты на правильном пути",
"Доверься процессу",
"Ты — свет в этом мире",
"Каждый твой шаг важен",
"Ты достоин самого лучшего",
"Сегодня — твой день",
"Ты — источник вдохновения",
"Вселенная на твоей стороне",
"Твоя энергия безгранична",
"Позволь себе сиять",
"Ты именно там, где должен быть",
"Счастье живёт внутри тебя",
"Ты меняешь мир к лучшему",
"Всё, что тебе нужно, уже есть",
"Ты — чудо",
"Расслабься, всё под контролем",
"Ты заслуживаешь любви",
"Твои мечты реальны",
"Сделай глубокий вдох",
"Ты в безопасности",
"Гав-гав",
"Ты — произведение искусства",
"Всё складывается идеально",
"Звезда моя",
"Почувствуй этот момент",
"Ты наполнен светом",
"Твоя улыбка меняет мир",
"Верь в себя",
];

const canvas=document.getElementById('cosmos');
const ctx=canvas.getContext('2d');
let W,H,centerX,centerY;

function resize(){
W=canvas.width=window.innerWidth;
H=canvas.height=window.innerHeight;
centerX=W/2;centerY=H/2;
}
resize();
window.addEventListener('resize',resize);

let bgPhase=0;
function drawBg(time){
bgPhase+=0.002;
const hue1=260+Math.sin(bgPhase)*20;
const hue2=240+Math.sin(bgPhase+0.8)*20;
const hue3=280+Math.sin(bgPhase+1.6)*15;
const g=ctx.createRadialGradient(centerX,centerY*0.6,0,centerX,centerY,Math.max(W,H)*0.85);
g.addColorStop(0,`hsl(${hue1},60%,12%)`);
g.addColorStop(0.4,`hsl(${hue2},50%,8%)`);
g.addColorStop(0.7,`hsl(${hue3},40%,6%)`);
g.addColorStop(1,'#050515');
ctx.fillStyle=g;
ctx.fillRect(0,0,W,H);
}

const LAYERS=[
{count:500,sizeMin:1,sizeMax:1.8,parallax:.2,twinkleSpeed:'slow',color:'255,255,255'},
{count:400,sizeMin:1.2,sizeMax:2.2,parallax:.5,twinkleSpeed:'mid',color:'220,210,255'},
{count:300,sizeMin:1.5,sizeMax:3,parallax:.8,twinkleSpeed:'fast',color:'200,180,255'},
{count:100,sizeMin:2.5,sizeMax:5,parallax:1,twinkleSpeed:'fast',color:'187,134,252'},
];
let stars=[];

function initStars(){
stars=[];
LAYERS.forEach((layer)=>{
for(let i=0;i<layer.count;i++){
stars.push({
x:Math.random()*W,y:Math.random()*H,
baseX:0,baseY:0,
size:layer.sizeMin+Math.random()*(layer.sizeMax-layer.sizeMin),
parallax:layer.parallax,
twinkleSpeed:layer.twinkleSpeed,
colorBase:layer.color,
phase:Math.random()*Math.PI*2,
twinkleRate:layer.twinkleSpeed==='slow'?0.2+Math.random()*0.3:
layer.twinkleSpeed==='mid'?0.5+Math.random()*0.6:
1+Math.random()*1.2,
// Случайные мигания: каждая звезда иногда резко тухнет и вспыхивает
blinkTimer:Math.random()*600,
blinkDuration:0,
blinkAlpha:1,
});
}
});
stars.forEach(s=>{s.baseX=s.x;s.baseY=s.y});
document.getElementById('starCount').textContent=stars.length;
}

let mouse={x:centerX,y:centerY,active:false};
document.addEventListener('mousemove',e=>{mouse.x=e.clientX;mouse.y=e.clientY;mouse.active=true});
document.addEventListener('mouseleave',()=>{mouse.active=false});
document.addEventListener('touchmove',e=>{
const t=e.touches[0];mouse.x=t.clientX;mouse.y=t.clientY;mouse.active=true;
},{passive:true});

const comets=[];
function spawnComet(){
const side=Math.floor(Math.random()*4);
let x,y,vx,vy;
switch(side){
case 0:x=Math.random()*W;y=-10;vx=(Math.random()-0.5)*0.6;vy=0.8+Math.random()*1.2;break;
case 1:x=W+10;y=Math.random()*H*0.6;vx=-0.7-Math.random()*1.2;vy=(Math.random()-0.3)*0.5;break;
case 2:x=Math.random()*W;y=H+10;vx=(Math.random()-0.5)*0.4;vy=-0.5-Math.random()*0.8;break;
case 3:x=-10;y=Math.random()*H*0.6;vx=0.5+Math.random()*1.2;vy=(Math.random()-0.3)*0.5;break;
}
comets.push({x,y,vx,vy,tail:[],life:1,decay:0.002+Math.random()*0.003,size:1.5+Math.random()*2});
}
for(let i=0;i<4;i++)spawnComet();

const bursts=[];

function spawnBurst(x,y,count=40){
const hue=260+Math.random()*40;
const saturation=60+Math.random()*40;
const lightness=60+Math.random()*30;
const particles=[];
for(let i=0;i<count;i++){
const angle=Math.random()*Math.PI*2;
const speed=1+Math.random()*4;
const size=1.5+Math.random()*3;
particles.push({
x,y,
vx:Math.cos(angle)*speed,
vy:Math.sin(angle)*speed,
life:1,
decay:0.008+Math.random()*0.015,
size,
color:`hsla(${hue+Math.random()*30-15},${saturation}%,${lightness+Math.random()*20-10}%,`,
});
}
bursts.push({particles,age:0});
}

// --- Аффирмации: только одна на экране ---
let currentAffirmEl=null;
let currentAffirmTimeout=null;

function showAffirmation(x,y){
// Убираем предыдущую сразу, не ждём таймаута
if(currentAffirmEl){
clearTimeout(currentAffirmTimeout);
removeAffirm(currentAffirmEl);
currentAffirmEl=null;
}
const text=AFFIRMATIONS[Math.floor(Math.random()*AFFIRMATIONS.length)];
const el=document.createElement('div');
el.className='affirmation';
el.textContent=text;
let posX=x-170+Math.random()*200;
let posY=y-80+Math.random()*100;
posX=Math.max(12,Math.min(W-360,posX));
posY=Math.max(60,Math.min(H-80,posY));
el.style.left=posX+'px';el.style.top=posY+'px';
document.body.appendChild(el);
currentAffirmEl=el;
currentAffirmTimeout=setTimeout(()=>{
removeAffirm(el);
if(currentAffirmEl===el)currentAffirmEl=null;
},4500);
}

function removeAffirm(el){
el.classList.add('affirm-fade');
setTimeout(()=>{if(el.parentNode)el.parentNode.removeChild(el)},800);
}

// --- Музыка: запуск при первом взаимодействии (для iOS/Android) ---
const audioEl=document.getElementById('bgMusic');
let audioPlaying=false;
let audioUserIntent=false; // пользователь хочет музыку

function tryPlayAudio(){
if(!audioUserIntent)return;
audioEl.play().then(()=>{
audioPlaying=true;
document.getElementById('audioBtn').classList.remove('muted');
}).catch(()=>{});
}

// Первое касание экрана — пытаемся запустить если хотели
document.addEventListener('touchstart',()=>{tryPlayAudio()},{passive:true,once:false});
document.addEventListener('click',()=>{tryPlayAudio()},{once:false});

document.getElementById('audioBtn').addEventListener('click',(e)=>{
e.stopPropagation();
const btn=document.getElementById('audioBtn');
if(audioPlaying){
audioEl.pause();audioPlaying=false;audioUserIntent=false;btn.classList.add('muted');
}else{
audioUserIntent=true;
audioEl.play().then(()=>{
audioPlaying=true;btn.classList.remove('muted');
}).catch(()=>{
// заблокировано — запустим при следующем тапе
btn.classList.remove('muted');
});
}
});

function handleClick(x,y){
showAffirmation(x,y);
}
document.addEventListener('click',e=>{
if(e.target.closest('button'))return;
handleClick(e.clientX,e.clientY);
});
document.addEventListener('touchstart',e=>{
if(e.target.closest('button'))return;
const t=e.touches[0];
handleClick(t.clientX,t.clientY);
},{passive:true});

document.getElementById('magicBtn').addEventListener('click',e=>{
e.stopPropagation();
for(let i=0;i<3;i++)setTimeout(spawnComet,i*300);
showAffirmation(centerX-60,centerY-40);
const btn=e.currentTarget;
btn.textContent='Волшебство';
setTimeout(()=>{btn.textContent='Хочу волшебства'},1000);
});

// --- Обновление звёзд с мерцанием ---
function updateStars(dt,time){
stars.forEach(s=>{
// Параллакс
const lx=mouse.x-centerX;
const ly=mouse.y-centerY;
const dx=lx*s.parallax*0.02;
const dy=ly*s.parallax*0.02;
s.x=s.baseX+dx;
s.y=s.baseY+dy;

// Притяжение к курсору
if(mouse.active){
const mdx=mouse.x-s.x;
const mdy=mouse.y-s.y;
const dist=Math.sqrt(mdx*mdx+mdy*mdy);
const gravRadius=180;
if(dist<gravRadius&&dist>2){
const force=(1-dist/gravRadius)*0.8;
s.x+=mdx/dist*force;
s.y+=mdy/dist*force;
}
}

// Случайное мигание: таймер отсчитывает, потом звезда мигает
s.blinkTimer-=dt;
if(s.blinkTimer<=0){
// Запускаем мигание: быстро гаснет и загорается
s.blinkDuration=8+Math.random()*12; // кадров
s.blinkTimer=200+Math.random()*800; // следующий сброс
}
if(s.blinkDuration>0){
s.blinkDuration-=dt;
// В середине мигания звезда тёмная
const t=1-s.blinkDuration/12;
s.blinkAlpha=t<0.5?1-t*2:t*2-1;
s.blinkAlpha=Math.max(0,s.blinkAlpha);
}else{
s.blinkAlpha=1;
}
});
}

let lastTime=0;

function update(time){
const dt=Math.min((time-lastTime)/16.667,3);
lastTime=time;

updateStars(dt,time);

comets.forEach(c=>{
c.x+=c.vx;c.y+=c.vy;
c.life-=c.decay;
c.tail.push({x:c.x,y:c.y});
if(c.tail.length>25)c.tail.shift();
});
for(let i=comets.length-1;i>=0;i--){
if(comets[i].life<=0){
spawnBurst(comets[i].x,comets[i].y,15);
comets.splice(i,1);
}
}
if(comets.length<4&&Math.random()<0.005)spawnComet();

bursts.forEach(b=>{
b.age++;
b.particles.forEach(p=>{
p.x+=p.vx;p.y+=p.vy;
p.vy+=0.04;
p.vx*=0.99;p.vy*=0.99;
p.life-=p.decay;
});
});
for(let i=bursts.length-1;i>=0;i--){
if(bursts[i].particles.every(p=>p.life<=0)||bursts[i].age>200){
bursts.splice(i,1);
}
}
}

function drawStar(x,y,r1,r2,points,rot){
ctx.beginPath();
for(let i=0;i<points*2;i++){
const angle=rot+i*Math.PI/points;
const r=i%2===0?r1:r2;
const px=x+Math.cos(angle)*r;
const py=y+Math.sin(angle)*r;
if(i===0)ctx.moveTo(px,py);else ctx.lineTo(px,py);
}
ctx.closePath();ctx.fill();
}
function drawSparkle(x,y,r,rot){
ctx.beginPath();
for(let i=0;i<4;i++){
const a=rot+i*Math.PI/2;
const px=x+Math.cos(a)*r;
const py=y+Math.sin(a)*r;
if(i===0)ctx.moveTo(px,py);
else{const cx=x+Math.cos(a-Math.PI/4)*r*0.2;const cy=y+Math.sin(a-Math.PI/4)*r*0.2;ctx.quadraticCurveTo(cx,cy,px,py)}
}
ctx.closePath();ctx.fill();
}

function draw(time){
ctx.clearRect(0,0,W,H);
drawBg(time);

// Звёзды
stars.forEach(s=>{
// Плавное мерцание (синус)
const brightness=0.5+0.5*Math.sin(time*0.001*s.twinkleRate+s.phase);
const minA=s.size<1.5?0.15:0.25;
const smoothAlpha=minA+(1-minA)*brightness;

// Умножаем на коэффициент случайного мигания
const alpha=smoothAlpha*s.blinkAlpha;

const col=s.colorBase;
const rot=s.phase;
if(s.size>3){
const glow=s.size*2;
const g=ctx.createRadialGradient(s.x,s.y,0,s.x,s.y,glow);
g.addColorStop(0,`rgba(${col},${alpha*0.25})`);
g.addColorStop(1,`rgba(${col},0)`);
ctx.fillStyle=g;
ctx.beginPath();ctx.arc(s.x,s.y,glow,0,Math.PI*2);ctx.fill();
}
ctx.fillStyle=`rgba(${col},${alpha})`;
if(s.size>3)drawStar(s.x,s.y,s.size*0.6,s.size*0.25,5,rot);
else if(s.size>1.8)drawSparkle(s.x,s.y,s.size*0.8,rot);
else{ctx.beginPath();ctx.arc(s.x,s.y,Math.max(1,s.size*0.7),0,Math.PI*2);ctx.fill()}
});
ctx.globalAlpha=1;

// Кометы
comets.forEach(c=>{
if(c.tail.length<2)return;
const tailLen=c.tail.length;
for(let i=0;i<tailLen;i++){
const t=c.tail[i];
const alphaT=(i/tailLen)*c.life*0.8;
const size=c.size*(i/tailLen);
ctx.moveTo(t.x,t.y);
ctx.lineTo(t.x+size*0.3,t.y+size*0.3);
}
ctx.strokeStyle=`rgba(200,180,255,${c.life*0.4})`;
ctx.lineWidth=c.size*1.2;
ctx.stroke();
const g=ctx.createRadialGradient(c.x,c.y,0,c.x,c.y,c.size*6);
g.addColorStop(0,`rgba(187,134,252,${c.life*0.6})`);
g.addColorStop(0.4,`rgba(150,130,220,${c.life*0.2})`);
g.addColorStop(1,'rgba(187,134,252,0)');
ctx.fillStyle=g;
ctx.beginPath();ctx.arc(c.x,c.y,c.size*6,0,Math.PI*2);ctx.fill();
ctx.fillStyle=`rgba(255,255,255,${c.life*0.9})`;
ctx.beginPath();ctx.arc(c.x,c.y,c.size,0,Math.PI*2);ctx.fill();
});

// Фейерверки
bursts.forEach(b=>{
b.particles.forEach(p=>{
if(p.life<=0)return;
ctx.globalAlpha=Math.max(0,p.life);
ctx.fillStyle=p.color+Math.max(0,p.life)+')';
ctx.beginPath();ctx.arc(p.x,p.y,p.size*p.life,0,Math.PI*2);ctx.fill();
const g=ctx.createRadialGradient(p.x,p.y,0,p.x,p.y,p.size*4*p.life);
const col=p.color.replace('hsla(','').replace(')','').split(',');
g.addColorStop(0,`hsla(${col[0]},${col[1]},${col[2]},${p.life*0.3})`);
g.addColorStop(1,`hsla(${col[0]},${col[1]},${col[2]},0)`);
ctx.fillStyle=g;
ctx.beginPath();ctx.arc(p.x,p.y,p.size*4*p.life,0,Math.PI*2);ctx.fill();
});
});
ctx.globalAlpha=1;
}

function loop(time){
update(time);
draw(time);
requestAnimationFrame(loop);
}

initStars();
requestAnimationFrame(loop);
</script>
</body>
</html>
